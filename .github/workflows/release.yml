name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: rbxex

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract changelog notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md \
            | sed '/./,$!d' | sed -e :a -e '/^\s*$/N;/\n\s*$/ba' > notes.md
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --draft \
              --title "${{ github.ref_name }}" \
              --notes-file notes.md
          else
            gh release create ${{ github.ref_name }} \
              --draft \
              --verify-tag \
              --title "${{ github.ref_name }}" \
              --notes-file notes.md
          fi

  build:
    name: Build (${{ matrix.label }})
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            label: windows-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release --locked --verbose --target ${{ matrix.target }}
      - name: Compute artifact name
        id: artifact
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "name=${BIN}-${TAG_NAME#v}-${{ matrix.label }}.zip" >> "$GITHUB_OUTPUT"
      - name: Package and upload
        shell: bash
        env:
          ARTIFACT: ${{ steps.artifact.outputs.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/${BIN}.exe" staging/
            cd staging && 7z a "../${ARTIFACT}" *
          else
            cp "target/${{ matrix.target }}/release/${BIN}" staging/
            cd staging && zip "../${ARTIFACT}" *
          fi
          gh release upload "${{ github.ref_name }}" "../${ARTIFACT}" --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
